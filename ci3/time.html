<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Come In 3 — Time</title>
<style>
  :root{
    --navy:#1a2a4a;        /* DFB away dark blue */
    --navy-2:#23365c;
    --teal:#1fb6c4;        /* DFB away turquoise */
    --teal-soft:#7fd9e2;
    --cream:#f3efe4;       /* warm low-glare background, dyslexia-friendly */
    --ink:#1a2233;
    --good:#2bb673;
    --warn:#e8a13a;
    --card:#ffffff;
    --shadow:0 6px 18px rgba(26,42,74,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--cream);
    color:var(--ink);
    font-size:20px;
    line-height:1.7;
    letter-spacing:.02em;
    -webkit-text-size-adjust:100%;
    text-align:left;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 40px;}

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    color:#fff;border-radius:20px;padding:18px 20px;margin-bottom:16px;
    box-shadow:var(--shadow);
  }
  .unit-name{font-size:15px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-soft);margin:0 0 2px;}
  h1{margin:0;font-size:30px;line-height:1.2;}
  .progress-track{height:12px;background:rgba(255,255,255,.18);border-radius:8px;margin-top:14px;overflow:hidden;}
  .progress-fill{height:100%;width:0;background:var(--teal);border-radius:8px;transition:width .4s ease;}

  /* ---------- Menu ---------- */
  .menu-title{font-size:18px;color:var(--navy);margin:6px 4px 10px;font-weight:700;}
  .menu-item{
    display:flex;align-items:center;gap:14px;
    background:var(--card);border:none;border-radius:18px;
    padding:18px 18px;margin-bottom:12px;width:100%;
    box-shadow:var(--shadow);cursor:pointer;text-align:left;
    font-size:20px;color:var(--ink);font-family:inherit;
  }
  .menu-item:active{transform:scale(.98);}
  .menu-emoji{font-size:30px;flex:0 0 auto;}
  .menu-label{font-weight:700;}
  .menu-sub{display:block;font-size:15px;color:#5a6a82;font-weight:400;letter-spacing:0;}

  /* ---------- Rule card ---------- */
  .rule{
    background:#fff;border-left:8px solid var(--teal);
    border-radius:14px;padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow);
  }
  .rule-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .rule-title{font-weight:700;color:var(--navy);font-size:18px;}
  .rule p{margin:6px 0;}
  .rule b{color:var(--navy);}

  /* ---------- Question card ---------- */
  .card{background:var(--card);border-radius:20px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
  .theme-tag{
    display:inline-block;font-size:14px;font-weight:700;letter-spacing:.03em;
    padding:5px 12px;border-radius:20px;margin-bottom:12px;
    background:var(--navy);color:#fff;
  }
  .theme-tag.teal{background:var(--teal);color:#06343a;}
  .prompt{font-size:21px;font-weight:700;color:var(--navy);margin:0 0 14px;}
  .sentence{font-size:24px;line-height:1.6;margin:10px 0 4px;}
  .blank{color:var(--teal);font-weight:800;}

  /* ---------- Speak buttons ---------- */
  .speak{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--teal);color:#06343a;border:none;border-radius:14px;
    padding:12px 18px;font-size:18px;font-weight:700;font-family:inherit;
    cursor:pointer;margin:4px 0 14px;
  }
  .speak:active{transform:scale(.97);}
  .speak .ico{font-size:22px;}
  .speak-mini{
    background:#eef6f7;color:var(--navy);border:2px solid var(--teal-soft);
    border-radius:12px;padding:8px 12px;font-size:16px;font-weight:700;
    font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  }

  /* ---------- Options ---------- */
  .options{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
  .opt{
    background:#f4f7fb;border:3px solid #dfe6f0;border-radius:16px;
    padding:18px;font-size:22px;font-weight:700;color:var(--ink);
    cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:14px;
  }
  .opt:active{transform:scale(.98);}
  .opt.correct{background:#e7f7ef;border-color:var(--good);color:#10623e;}
  .opt.wrong{background:#fdeede;border-color:var(--warn);color:#8a5410;}
  .opt-num{
    flex:0 0 auto;width:38px;height:38px;border-radius:50%;
    background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:20px;
  }

  /* big number/time options */
  .bigopts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px;}
  .bigopt{
    background:#f4f7fb;border:3px solid #dfe6f0;border-radius:16px;
    padding:14px 8px;font-size:30px;font-weight:800;color:var(--navy);
    cursor:pointer;font-family:inherit;text-align:center;
  }
  .bigopt:active{transform:scale(.96);}
  .bigopt.correct{background:#e7f7ef;border-color:var(--good);color:#10623e;}
  .bigopt.wrong{background:#fdeede;border-color:var(--warn);color:#8a5410;}

  /* clock choice grid */
  .clockgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:10px;}
  .clockopt{
    background:#f4f7fb;border:3px solid #dfe6f0;border-radius:18px;
    padding:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .clockopt:active{transform:scale(.96);}
  .clockopt.correct{background:#e7f7ef;border-color:var(--good);}
  .clockopt.wrong{background:#fdeede;border-color:var(--warn);}
  .clockopt svg{width:100%;height:auto;display:block;}

  /* match pairs */
  .match{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;}
  .mcol{display:flex;flex-direction:column;gap:10px;}
  .mtile{
    background:#f4f7fb;border:3px solid #dfe6f0;border-radius:14px;
    padding:14px;font-size:20px;font-weight:700;color:var(--ink);
    cursor:pointer;font-family:inherit;text-align:center;min-height:56px;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .mtile .em{font-size:28px;}
  .mtile.sel{border-color:var(--teal);background:#e9f7f9;}
  .mtile.done{background:#e7f7ef;border-color:var(--good);color:#10623e;opacity:.75;}
  .mtile:active{transform:scale(.97);}

  /* swipe */
  .swipe-stage{position:relative;margin-top:10px;}
  .swipe-card{
    background:#f4f7fb;border:3px solid #dfe6f0;border-radius:20px;
    padding:24px 18px;text-align:center;
  }
  .swipe-sentence{font-size:24px;font-weight:700;color:var(--navy);margin:14px 0 4px;}
  .swipe-btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;}
  .swipe-btn{
    border:none;border-radius:18px;padding:20px;font-size:26px;font-weight:800;
    font-family:inherit;cursor:pointer;
  }
  .swipe-btn.no{background:#fdeede;color:#8a5410;}
  .swipe-btn.yes{background:#e7f7ef;color:#10623e;}
  .swipe-btn:active{transform:scale(.96);}

  /* puzzle */
  .puz-build{
    min-height:64px;background:#eef2f8;border:3px dashed #c7d2e2;border-radius:14px;
    padding:10px;display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;align-items:center;
  }
  .puz-bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .puztile{
    background:var(--navy);color:#fff;border:none;border-radius:12px;
    padding:12px 14px;font-size:20px;font-weight:700;font-family:inherit;cursor:pointer;
  }
  .puztile:active{transform:scale(.95);}
  .puztile.inbuild{background:var(--teal);color:#06343a;}

  /* feedback */
  .feedback{margin-top:16px;border-radius:16px;padding:16px;font-size:19px;font-weight:700;display:none;}
  .feedback.show{display:block;}
  .feedback.good{background:#e7f7ef;color:#10623e;}
  .feedback.soft{background:#fff4e2;color:#8a5410;}
  .feedback .fb-rule{font-weight:400;margin-top:6px;color:#4a4030;}

  .nav{display:flex;gap:12px;margin-top:8px;}
  .btn{
    flex:1;border:none;border-radius:16px;padding:16px;font-size:19px;font-weight:800;
    font-family:inherit;cursor:pointer;
  }
  .btn.primary{background:var(--teal);color:#06343a;}
  .btn.ghost{background:#e7ecf4;color:var(--navy);}
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.4;}

  .backbtn{
    background:none;border:none;color:var(--navy);font-size:17px;font-weight:700;
    font-family:inherit;cursor:pointer;padding:8px 4px;margin-bottom:6px;display:inline-flex;align-items:center;gap:6px;
  }

  /* confetti */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50;}
  .confetti-bit{position:absolute;width:10px;height:14px;border-radius:2px;will-change:transform,opacity;}

  .hidden{display:none;}
  .done-screen{text-align:center;padding:30px 10px;}
  .done-screen .big{font-size:56px;}
  .done-screen h2{color:var(--navy);font-size:26px;margin:10px 0;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="unit-name">Come In 3</p>
    <h1 id="screenTitle">⏰ Time</h1>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </header>

  <!-- ============ MENU (static HTML so it works on file://) ============ -->
  <div id="menu">
    <p class="menu-title">Choose a game</p>

    <button class="menu-item" onclick="startTopic(0)">
      <span class="menu-emoji">🕐</span>
      <span><span class="menu-label">What's the time?</span>
      <span class="menu-sub">Listen and tap the clock</span></span>
    </button>

    <button class="menu-item" onclick="startTopic(1)">
      <span class="menu-emoji">🔢</span>
      <span><span class="menu-label">It's … o'clock</span>
      <span class="menu-sub">Fill in the hour</span></span>
    </button>

    <button class="menu-item" onclick="startTopic(2)">
      <span class="menu-emoji">😊</span>
      <span><span class="menu-label">How are you?</span>
      <span class="menu-sub">Match the feelings</span></span>
    </button>

    <button class="menu-item" onclick="startTopic(3)">
      <span class="menu-emoji">👋</span>
      <span><span class="menu-label">Right or wrong?</span>
      <span class="menu-sub">Swipe yes or no</span></span>
    </button>

    <button class="menu-item" onclick="startTopic(4)">
      <span class="menu-emoji">🧩</span>
      <span><span class="menu-label">Build the question</span>
      <span class="menu-sub">Put the words in order</span></span>
    </button>
  </div>

  <!-- ============ QUIZ AREA ============ -->
  <div id="quiz" class="hidden">
    <button class="backbtn" onclick="goMenu()">‹ Menu</button>
    <div id="ruleSlot"></div>
    <div id="cardSlot"></div>
    <div class="feedback" id="feedback"></div>
    <div class="nav">
      <button class="btn ghost" id="checkBtn" onclick="checkAnswer()">Check</button>
      <button class="btn primary hidden" id="nextBtn" onclick="nextQuestion()">Next ›</button>
    </div>
  </div>

  <!-- ============ DONE ============ -->
  <div id="done" class="hidden done-screen">
    <div class="big">🏆</div>
    <h2 id="doneMsg">Super!</h2>
    <div class="nav">
      <button class="btn primary" onclick="goMenu()">Back to games</button>
    </div>
  </div>

</div>
<div id="confetti"></div>

<script>
"use strict";

/* =========================================================
   SVG CLOCK GENERATOR  (sharp, scalable, DFB colours)
   hour = 1..12  -> draws hour hand on that hour, minute at 12
   ========================================================= */
function clockSVG(hour){
  var cx=60, cy=60, r=52;
  var ticks="";
  for(var i=0;i<12;i++){
    var a=(i/12)*2*Math.PI - Math.PI/2;
    var x1=cx+Math.cos(a)*(r-4), y1=cy+Math.sin(a)*(r-4);
    var x2=cx+Math.cos(a)*(r-12), y2=cy+Math.sin(a)*(r-12);
    ticks+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="#1fb6c4" stroke-width="3" stroke-linecap="round"/>';
  }
  // numbers 12,3,6,9 for orientation
  var nums="";
  var labels=[[12,0,-r+18],[3,r-16,4],[6,0,r-12],[9,-r+14,4]];
  for(var j=0;j<labels.length;j++){
    nums+='<text x="'+(cx+labels[j][1])+'" y="'+(cy+labels[j][2]+6)+'" text-anchor="middle" font-size="14" font-weight="800" fill="#1a2a4a" font-family="-apple-system,Segoe UI,sans-serif">'+labels[j][0]+'</text>';
  }
  // hour hand
  var ha=(hour%12)/12*2*Math.PI - Math.PI/2;
  var hx=cx+Math.cos(ha)*(r-26), hy=cy+Math.sin(ha)*(r-26);
  // minute hand straight up (o'clock)
  var mx=cx, my=cy-(r-14);
  return '<svg viewBox="0 0 120 120" role="img" aria-label="'+hour+" o\'clock"+'">'+
    '<circle cx="60" cy="60" r="56" fill="#ffffff" stroke="#1a2a4a" stroke-width="4"/>'+
    ticks+nums+
    '<line x1="60" y1="60" x2="'+mx+'" y2="'+my+'" stroke="#23365c" stroke-width="4" stroke-linecap="round"/>'+
    '<line x1="60" y1="60" x2="'+hx.toFixed(1)+'" y2="'+hy.toFixed(1)+'" stroke="#1fb6c4" stroke-width="6" stroke-linecap="round"/>'+
    '<circle cx="60" cy="60" r="6" fill="#1a2a4a"/></svg>';
}

/* =========================================================
   SPEECH  (Web Speech API, en-GB)
   ========================================================= */
var voiceReady=false, chosenVoice=null;
function pickVoice(){
  var vs=window.speechSynthesis.getVoices();
  // prefer a British English voice, then any English
  chosenVoice = vs.find(function(v){return /en-GB/i.test(v.lang);})
            || vs.find(function(v){return /^en/i.test(v.lang);})
            || vs[0] || null;
}
if("speechSynthesis" in window){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  if(chosenVoice) u.voice=chosenVoice;
  u.lang="en-GB";
  u.rate=0.85;   // slower, dyslexia-friendly
  u.pitch=1.0;
  window.speechSynthesis.speak(u);
}
function speakDE(text){
  if(!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  var vs=window.speechSynthesis.getVoices();
  var de=vs.find(function(v){return /de/i.test(v.lang);});
  var u=new SpeechSynthesisUtterance(text);
  if(de) u.voice=de;
  u.lang="de-DE";
  u.rate=0.9;
  window.speechSynthesis.speak(u);
}

/* number words for the clock */
var NUMWORD=["","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve"];

/* =========================================================
   CONTENT  (topics array — only this changes per unit)
   ========================================================= */
var UNIT_NAME="Time";

var topics=[
  /* 0 — Listen & choose the clock */
  {
    title:"What's the time?",
    rule:'<div class="rule-head"><span class="rule-title">⏰ What\'s the time?</span>'+
         '<button class="speak-mini" onclick="speak(\'What is the time? It is three o clock.\')">🔊 Rule</button></div>'+
         '<p>Ask: <b>What\'s the time?</b></p>'+
         '<p>Answer: <b>It\'s … o\'clock.</b></p>'+
         '<p>Tap 🔊 — listen — then tap the right clock.</p>',
    questions:[
      {type:"clock", hour:3, theme:"🔊 Listen", teal:true},
      {type:"clock", hour:8, theme:"🔊 Listen", teal:true},
      {type:"clock", hour:6, theme:"🔊 Listen", teal:true},
      {type:"clock", hour:11, theme:"🔊 Listen", teal:true},
      {type:"clock", hour:5, theme:"🔊 Listen", teal:true}
    ]
  },

  /* 1 — Gap fill: It's __ o'clock */
  {
    title:"It's … o'clock",
    rule:'<div class="rule-head"><span class="rule-title">🔢 It\'s … o\'clock</span>'+
         '<button class="speak-mini" onclick="speak(\'It is four o clock.\')">🔊 Rule</button></div>'+
         '<p>Look at the clock. Say the hour.</p>'+
         '<p><b>It\'s four o\'clock.</b> 🕓</p>',
    questions:[
      {type:"gap", hour:4, theme:"🏎️ Auto-Zeit", opts:[3,4,5], correct:1,
        aff:"Volltreffer! Wie ein perfekter Boxenstopp! 🏎️", wrong:"Schau auf den blauen Zeiger. Es ist four o'clock."},
      {type:"gap", hour:7, theme:"⚽ Fußball-Zeit", opts:[7,9,2], correct:0,
        aff:"Tooor! Genau richtig! ⚽", wrong:"Der kurze blaue Zeiger zeigt auf 7. It's seven o'clock."},
      {type:"gap", hour:10, theme:"🏎️ Auto-Zeit", opts:[1,10,12], correct:1,
        aff:"Pole Position! 🏁", wrong:"Es ist ten o'clock. Zähl die Stunden mit."},
      {type:"gap", hour:2, theme:"⚽ Fußball-Zeit", opts:[2,6,8], correct:0,
        aff:"Stark! Du bist im Spiel! ⚽", wrong:"It's two o'clock. Der blaue Zeiger zeigt auf 2."},
      {type:"gap", hour:9, theme:"🏎️ Auto-Zeit", opts:[3,11,9], correct:2,
        aff:"Schnell und richtig! 🏎️💨", wrong:"It's nine o'clock."}
    ]
  },

  /* 2 — Match pairs: feeling <-> emoji */
  {
    title:"How are you?",
    rule:'<div class="rule-head"><span class="rule-title">😊 How are you?</span>'+
         '<button class="speak-mini" onclick="speak(\'How are you? I am tired.\')">🔊 Rule</button></div>'+
         '<p>Ask: <b>How are you?</b></p>'+
         '<p>Answer: <b>I\'m tired. / I\'m happy.</b></p>'+
         '<p>Tap a word, then tap its picture.</p>',
    questions:[
      {type:"match", theme:"🔗 Match", teal:true,
        pairs:[["tired","😴"],["happy","😊"],["hungry","🍽️"]],
        aff:"Alle Paare! Mannschaftsleistung! ⚽🏆", wrong:"Schau nochmal — tippe ein Wort und dann das Bild."},
      {type:"match", theme:"🔗 Match", teal:true,
        pairs:[["sad","😢"],["angry","😠"],["thirsty","🥤"]],
        aff:"Perfekt verbunden! 🏁", wrong:"Fast! Tippe das Wort, dann das passende Bild."},
      {type:"match", theme:"🔗 Match", teal:true,
        pairs:[["scared","😨"],["grumpy","😤"],["happy","😄"]],
        aff:"Geschafft — Doppelpass sitzt! ⚽", wrong:"Probier es nochmal in Ruhe."}
    ]
  },

  /* 3 — Swipe yes/no */
  {
    title:"Right or wrong?",
    rule:'<div class="rule-head"><span class="rule-title">👋 Right or wrong?</span>'+
         '<button class="speak-mini" onclick="speak(\'Look at the clock. Is it right?\')">🔊 Rule</button></div>'+
         '<p>Look at the clock and read the sentence.</p>'+
         '<p>Tap ✅ <b>yes</b> if it is right. Tap ❌ <b>no</b> if it is wrong.</p>',
    questions:[
      {type:"swipe", hour:5, text:"It's five o'clock.", answer:true, theme:"⚽ Check",
        aff:"Richtig! Sicher wie ein Elfmeter! ⚽", wrong:"Schau genau hin — der blaue Zeiger zeigt auf 5."},
      {type:"swipe", hour:8, text:"It's three o'clock.", answer:false, theme:"🏎️ Check",
        aff:"Erkannt! Gutes Auge! 🏎️", wrong:"Der Zeiger zeigt auf 8. It's eight o'clock."},
      {type:"swipe", hour:12, text:"It's twelve o'clock.", answer:true, theme:"⚽ Check",
        aff:"Tor! Genau! ⚽", wrong:"Beide Zeiger oben — das ist twelve o'clock, also richtig."},
      {type:"swipe", hour:1, text:"It's ten o'clock.", answer:false, theme:"🏎️ Check",
        aff:"Stark gebremst und richtig! 🏁", wrong:"Der Zeiger zeigt auf 1. It's one o'clock."},
      {type:"swipe", hour:9, text:"It's nine o'clock.", answer:true, theme:"⚽ Check",
        aff:"Sauber! ⚽", wrong:"Der blaue Zeiger zeigt auf 9 — richtig!"}
    ]
  },

  /* 4 — Puzzle: build the question */
  {
    title:"Build the question",
    rule:'<div class="rule-head"><span class="rule-title">🧩 Build the question</span>'+
         '<button class="speak-mini" onclick="speak(\'What is the time?\')">🔊 Rule</button></div>'+
         '<p>Tap the words in the right order.</p>'+
         '<p>Tip: a question ends with <b>?</b></p>',
    questions:[
      {type:"puzzle", theme:"🧩 Order", words:["What's","the","time?"], theme2:true,
        aff:"Frage gebaut wie ein Profi! ⚽", wrong:"Beginne mit \"What's\". Tippe 🔊 zum Hören."},
      {type:"puzzle", theme:"🧩 Order", words:["It's","six","o'clock."], theme2:true,
        aff:"Satz steht! 🏎️", wrong:"Beginne mit \"It's\"."},
      {type:"puzzle", theme:"🧩 Order", words:["How","are","you?"], theme2:true,
        aff:"Perfekt! 🏆", wrong:"Beginne mit \"How\"."}
    ]
  }
];

/* =========================================================
   SHARED ENGINE  (identical across units)
   ========================================================= */
var curTopic=0, curQ=0, answered=false;

function $(id){return document.getElementById(id);}

function startTopic(i){
  curTopic=i; curQ=0;
  $("menu").classList.add("hidden");
  $("done").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  $("screenTitle").textContent=topics[i].title;
  $("ruleSlot").innerHTML='<div class="rule">'+topics[i].rule+'</div>';
  loadQuestion();
}

function goMenu(){
  window.speechSynthesis && window.speechSynthesis.cancel();
  $("quiz").classList.add("hidden");
  $("done").classList.add("hidden");
  $("menu").classList.remove("hidden");
  $("screenTitle").textContent="⏰ Time";
  setProgress(0);
}

function setProgress(p){ $("progressFill").style.width=p+"%"; }

function loadQuestion(){
  answered=false;
  var t=topics[curTopic], q=t.questions[curQ];
  setProgress(Math.round((curQ)/t.questions.length*100));
  $("feedback").className="feedback";
  $("feedback").innerHTML="";
  $("nextBtn").classList.add("hidden");
  $("checkBtn").classList.remove("hidden");
  $("checkBtn").disabled=false;

  var tag='<span class="theme-tag '+((q.teal||q.theme2)?"teal":"")+'">'+(q.theme||"")+'</span>';
  var html=tag;

  if(q.type==="clock"){
    html+=renderClock(q);
    $("checkBtn").classList.add("hidden"); // auto-check on tap
  }else if(q.type==="gap"){
    html+=renderGap(q);
    $("checkBtn").classList.add("hidden");
  }else if(q.type==="match"){
    html+=renderMatch(q);
    $("checkBtn").classList.add("hidden");
  }else if(q.type==="swipe"){
    html+=renderSwipe(q);
    $("checkBtn").classList.add("hidden");
  }else if(q.type==="puzzle"){
    html+=renderPuzzle(q);
  }
  $("cardSlot").innerHTML='<div class="card">'+html+'</div>';

  // wire up per-type after DOM insert
  if(q.type==="match") wireMatch(q);
  if(q.type==="puzzle") wirePuzzle(q);
}

/* ---------- CLOCK (listen & choose) ---------- */
function renderClock(q){
  // build 3 options including the correct hour
  var opts=shuffle(distinctHours(q.hour,3));
  var grid='<div class="clockgrid">';
  for(var i=0;i<opts.length;i++){
    grid+='<button class="clockopt" data-h="'+opts[i]+'" onclick="answerClock(this,'+q.hour+')">'+clockSVG(opts[i])+'</button>';
  }
  grid+='</div>';
  return '<p class="prompt">Listen — which clock?</p>'+
    '<button class="speak" onclick="speak(\'It is '+NUMWORD[q.hour]+' o clock.\')"><span class="ico">🔊</span> Listen again</button>'+
    grid;
}
function answerClock(el,correctHour){
  if(answered) return; answered=true;
  var picked=parseInt(el.getAttribute("data-h"),10);
  var all=document.querySelectorAll(".clockopt");
  all.forEach(function(c){
    var h=parseInt(c.getAttribute("data-h"),10);
    if(h===correctHour) c.classList.add("correct");
    c.style.pointerEvents="none";
  });
  if(picked===correctHour){
    win("Yes! It's "+NUMWORD[correctHour]+" o'clock! ⚽","");
    speak("Yes! It is "+NUMWORD[correctHour]+" o clock.");
  }else{
    el.classList.add("wrong");
    soft("💛 Fast! It's "+NUMWORD[correctHour]+" o'clock.","Hör nochmal: tippe 🔊.");
    speak("It is "+NUMWORD[correctHour]+" o clock.");
  }
  showNext();
}

/* ---------- GAP (it's __ o'clock) ---------- */
function renderGap(q){
  var grid='<div class="bigopts">';
  for(var i=0;i<q.opts.length;i++){
    grid+='<button class="bigopt" data-i="'+i+'" onclick="answerGap(this,'+i+','+q.correct+')">'+q.opts[i]+'</button>';
  }
  grid+='</div>';
  return '<div style="display:flex;justify-content:center;margin:4px 0 12px">'+
         '<div style="width:150px">'+clockSVG(q.hour)+'</div></div>'+
         '<p class="prompt">It\'s <span class="blank">___</span> o\'clock.</p>'+
         '<button class="speak" onclick="speak(\'It is '+NUMWORD[q.hour]+' o clock.\')"><span class="ico">🔊</span> Listen</button>'+
         grid;
}
function answerGap(el,i,correct){
  if(answered) return; answered=true;
  var q=topics[curTopic].questions[curQ];
  var all=document.querySelectorAll(".bigopt");
  all.forEach(function(b,idx){
    if(idx===correct) b.classList.add("correct");
    b.style.pointerEvents="none";
  });
  if(i===correct){
    win(q.aff,"");
    speak("It is "+NUMWORD[q.hour]+" o clock.");
  }else{
    el.classList.add("wrong");
    soft("💛 Fast!",q.wrong);
    speak("It is "+NUMWORD[q.hour]+" o clock.");
  }
  showNext();
}

/* ---------- MATCH PAIRS ---------- */
var matchSel=null, matchDone=0, matchTotal=0;
function renderMatch(q){
  matchSel=null; matchDone=0; matchTotal=q.pairs.length;
  var left=q.pairs.map(function(p){return p[0];});
  var right=shuffle(q.pairs.map(function(p){return p[1];}));
  var L='<div class="mcol">';
  left.forEach(function(w){
    L+='<button class="mtile" data-type="word" data-val="'+w+'">'+w+
       ' <span class="em" onclick="event.stopPropagation();speak(\''+w+'\')">🔊</span></button>';
  });
  L+='</div>';
  var R='<div class="mcol">';
  right.forEach(function(em){
    R+='<button class="mtile" data-type="emoji" data-val="'+em+'"><span class="em">'+em+'</span></button>';
  });
  R+='</div>';
  return '<p class="prompt">Match the feeling</p>'+
         '<div class="match">'+L+R+'</div>';
}
function wireMatch(q){
  var pairsMap={};
  q.pairs.forEach(function(p){pairsMap[p[0]]=p[1];});
  var tiles=document.querySelectorAll(".mtile");
  tiles.forEach(function(t){
    t.addEventListener("click",function(){
      if(t.classList.contains("done")) return;
      if(t.getAttribute("data-type")==="word") speak(t.getAttribute("data-val"));
      if(!matchSel){
        if(t.getAttribute("data-type")!=="word"){ return; } // must start with a word
        matchSel=t; t.classList.add("sel");
        return;
      }
      if(matchSel===t){ t.classList.remove("sel"); matchSel=null; return; }
      if(t.getAttribute("data-type")==="word"){
        matchSel.classList.remove("sel"); matchSel=t; t.classList.add("sel"); return;
      }
      // t is emoji, matchSel is word
      var word=matchSel.getAttribute("data-val");
      var em=t.getAttribute("data-val");
      if(pairsMap[word]===em){
        matchSel.classList.remove("sel"); matchSel.classList.add("done"); t.classList.add("done");
        matchSel=null; matchDone++;
        if(matchDone===matchTotal){ answered=true; win(q.aff,""); showNext(); }
      }else{
        var bad=t;
        matchSel.classList.remove("sel");
        bad.classList.add("wrong");
        soft("💛 Fast!",q.wrong);
        var keep=matchSel; matchSel=null;
        setTimeout(function(){ bad.classList.remove("wrong"); $("feedback").className="feedback"; },900);
      }
    });
  });
}

/* ---------- SWIPE ---------- */
function renderSwipe(q){
  return '<div class="swipe-stage"><div class="swipe-card">'+
    '<div style="width:140px;margin:0 auto">'+clockSVG(q.hour)+'</div>'+
    '<div class="swipe-sentence">'+q.text+'</div>'+
    '<button class="speak" onclick="speak(\''+q.text.replace(/'/g,"")+'\')"><span class="ico">🔊</span> Listen</button>'+
    '<div class="swipe-btns">'+
      '<button class="swipe-btn no" onclick="answerSwipe(false,'+q.answer+')">❌ No</button>'+
      '<button class="swipe-btn yes" onclick="answerSwipe(true,'+q.answer+')">✅ Yes</button>'+
    '</div></div></div>';
}
function answerSwipe(picked,correct){
  if(answered) return; answered=true;
  var q=topics[curTopic].questions[curQ];
  document.querySelectorAll(".swipe-btn").forEach(function(b){b.style.pointerEvents="none";});
  if(picked===correct){ win(q.aff,""); }
  else{ soft("💛 Fast!",q.wrong); }
  speak(q.text.replace(/'/g,""));
  showNext();
}

/* ---------- PUZZLE ---------- */
var puzBuild=[];
function renderPuzzle(q){
  puzBuild=[];
  var bank=shuffle(q.words.slice());
  var b='<div class="puz-bank" id="puzBank">';
  bank.forEach(function(w,i){
    b+='<button class="puztile" data-w="'+w.replace(/"/g,"&quot;")+'">'+w+'</button>';
  });
  b+='</div>';
  return '<p class="prompt">Put the words in order</p>'+
    '<button class="speak" onclick="speak(\''+q.words.join(" ").replace(/'/g,"")+'\')"><span class="ico">🔊</span> Listen</button>'+
    '<div class="puz-build" id="puzBuild"><span style="color:#9aa7bd">tap words…</span></div>'+
    b;
}
function wirePuzzle(q){
  var bank=document.getElementById("puzBank");
  bank.querySelectorAll(".puztile").forEach(function(tile){
    tile.addEventListener("click",function(){
      if(tile.classList.contains("inbuild")) return;
      tile.classList.add("inbuild");
      puzBuild.push(tile.getAttribute("data-w"));
      renderBuild();
    });
  });
}
function renderBuild(){
  var area=document.getElementById("puzBuild");
  if(puzBuild.length===0){ area.innerHTML='<span style="color:#9aa7bd">tap words…</span>'; return; }
  area.innerHTML="";
  puzBuild.forEach(function(w,i){
    var t=document.createElement("button");
    t.className="puztile inbuild";
    t.textContent=w;
    t.onclick=function(){
      // tap to remove last-in style: remove this and re-enable in bank
      puzBuild.splice(i,1);
      var bankTiles=document.querySelectorAll("#puzBank .puztile");
      // re-enable one matching bank tile
      for(var k=0;k<bankTiles.length;k++){
        if(bankTiles[k].getAttribute("data-w")===w && bankTiles[k].classList.contains("inbuild")){
          // only re-enable if not already counted — simplest: rebuild enable states
        }
      }
      syncBank();
      renderBuild();
    };
    area.appendChild(t);
  });
}
function syncBank(){
  var bankTiles=document.querySelectorAll("#puzBank .puztile");
  var used=puzBuild.slice();
  bankTiles.forEach(function(bt){
    var w=bt.getAttribute("data-w");
    var idx=used.indexOf(w);
    if(idx>=0){ bt.classList.add("inbuild"); used.splice(idx,1); }
    else{ bt.classList.remove("inbuild"); }
  });
}
function checkAnswer(){
  var q=topics[curTopic].questions[curQ];
  if(q.type!=="puzzle") return;
  if(answered) return;
  var target=q.words.join(" ");
  var got=puzBuild.join(" ");
  if(got===target){
    answered=true; win(q.aff,"");
    speak(q.words.join(" ").replace(/'/g,""));
    showNext();
  }else{
    soft("💛 Fast!",q.wrong);
  }
}

/* ---------- feedback + flow ---------- */
function win(msg,rule){
  var f=$("feedback");
  f.className="feedback good show";
  f.innerHTML=msg+(rule?'<div class="fb-rule">'+rule+'</div>':"");
  burst();
}
function soft(msg,rule){
  var f=$("feedback");
  f.className="feedback soft show";
  f.innerHTML=msg+(rule?'<div class="fb-rule">'+rule+'</div>':"");
}
function showNext(){
  $("checkBtn").classList.add("hidden");
  $("nextBtn").classList.remove("hidden");
}
function nextQuestion(){
  var t=topics[curTopic];
  curQ++;
  if(curQ>=t.questions.length){
    setProgress(100);
    $("quiz").classList.add("hidden");
    $("done").classList.remove("hidden");
    $("doneMsg").textContent="Super! You finished "+t.title+"! 🏆";
    speak("Well done!");
    burst();
    return;
  }
  loadQuestion();
}

/* ---------- helpers ---------- */
function shuffle(a){
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}
function distinctHours(correct,n){
  var set=[correct];
  while(set.length<n){
    var h=1+Math.floor(Math.random()*12);
    if(set.indexOf(h)<0) set.push(h);
  }
  return set;
}

/* ---------- confetti ---------- */
function burst(){
  if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  var c=$("confetti");
  var colors=["#1fb6c4","#1a2a4a","#7fd9e2","#ffffff","#2bb673"];
  for(var i=0;i<26;i++){
    (function(){
      var bit=document.createElement("div");
      bit.className="confetti-bit";
      bit.style.background=colors[Math.floor(Math.random()*colors.length)];
      bit.style.left=(40+Math.random()*20)+"%";
      bit.style.top="40%";
      c.appendChild(bit);
      var dx=(Math.random()-0.5)*400;
      var dy=-(150+Math.random()*250);
      var rot=(Math.random()-0.5)*720;
      var dur=900+Math.random()*700;
      bit.animate([
        {transform:"translate(0,0) rotate(0deg)",opacity:1},
        {transform:"translate("+dx+"px,"+(dy+400)+"px) rotate("+rot+"deg)",opacity:0}
      ],{duration:dur,easing:"cubic-bezier(.2,.6,.4,1)"});
      setTimeout(function(){bit.remove();},dur);
    })();
  }
}

/* warm up voices on first tap (iOS needs a user gesture) */
document.body.addEventListener("touchstart",function once(){
  if("speechSynthesis" in window){ pickVoice(); }
},{once:true});
