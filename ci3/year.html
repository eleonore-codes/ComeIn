<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Come In 3 — The year</title>
<style>
  :root{
    --navy:#1a2a4a;
    --navy-2:#23365c;
    --teal:#1fb6c4;
    --teal-soft:#7fd9e2;
    --cream:#f3efe4;
    --ink:#1a2233;
    --good:#2bb673;
    --warn:#e8a13a;
    --card:#ffffff;
    --shadow:0 6px 18px rgba(26,42,74,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--cream);
    color:var(--ink);
    font-size:20px;
    line-height:1.7;
    letter-spacing:.02em;
    -webkit-text-size-adjust:100%;
    text-align:left;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 40px;}

  header{
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    color:#fff;border-radius:20px;padding:18px 20px;margin-bottom:16px;
    box-shadow:var(--shadow);
  }
  .unit-name{font-size:15px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-soft);margin:0 0 2px;}
  h1{margin:0;font-size:30px;line-height:1.2;}
  .progress-track{height:12px;background:rgba(255,255,255,.18);border-radius:8px;margin-top:14px;overflow:hidden;}
  .progress-fill{height:100%;width:0;background:var(--teal);border-radius:8px;transition:width .4s ease;}

  .menu-title{font-size:18px;color:var(--navy);margin:6px 4px 10px;font-weight:700;}
  .menu-item{
    display:flex;align-items:center;gap:14px;
    background:var(--card);border:none;border-radius:18px;
    padding:18px 18px;margin-bottom:12px;width:100%;
    box-shadow:var(--shadow);cursor:pointer;text-align:left;
    font-size:20px;color:var(--ink);font-family:inherit;
  }
  .menu-item:active{transform:scale(.98);}
  .menu-emoji{font-size:30px;flex:0 0 auto;}
  .menu-label{font-weight:700;}
  .menu-sub{display:block;font-size:15px;color:#5a6a82;font-weight:400;letter-spacing:0;}

  .rule{
    background:#fff;border-left:8px solid var(--teal);
    border-radius:14px;padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow);
  }
  .rule-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .rule-title{font-weight:700;color:var(--navy);font-size:18px;}
  .rule p{margin:6px 0;}
  .rule b{color:var(--navy);}

  .card{background:var(--card);border-radius:20px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
  .theme-tag{
    display:inline-block;font-size:14px;font-weight:700;letter-spacing:.03em;
    padding:5px 12px;border-radius:20px;margin-bottom:12px;
    background:var(--navy);color:#fff;
  }
  .theme-tag.teal{background:var(--teal);color:#06343a;}
  .prompt{font-size:21px;font-weight:700;color:var(--navy);margin:0 0 14px;}
  .sentence{font-size:24px;line-height:1.5;margin:10px 0 4px;color:var(--ink);}

  .speak{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--teal);color:#06343a;border:none;border-radius:14px;
    padding:12px 18px;font-size:18px;font-weight:700;font-family:inherit;
    cursor:pointer;margin:4px 0 14px;
  }
  .speak:active{transform:scale(.97);}
  .speak .ico{font-size:22px;}
  .speak-mini{
    background:#eef6f7;color:var(--navy);border:2px solid var(--teal-soft);
    border-radius:12px;padding:8px 12px;font-size:16px;font-weight:700;
    font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  }

  .options{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
  .opt{
    background:#f4f7fb;border:3px solid #dfe6f0;border-radius:16px;
    padding:16px 14px;font-size:23px;font-weight:700;color:var(--ink);
    cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:12px;
  }
  .opt:active{transform:scale(.98);}
  .opt.correct{background:#e7f7ef;border-color:var(--good);color:#10623e;}
  .opt.wrong{background:#fdeede;border-color:var(--warn);color:#8a5410;}
  .opt-label{flex:1;}
  .opt-speak{
    flex:0 0 auto;width:44px;height:44px;border-radius:12px;
    background:#eef6f7;border:2px solid var(--teal-soft);
    display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;
  }

  .match{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;}
  .mcol{display:flex;flex-direction:column;gap:10px;}
  .mtile{
    background:#f4f7fb;border:3px solid #dfe6f0;border-radius:14px;
    padding:14px;font-size:20px;font-weight:700;color:var(--ink);
    cursor:pointer;font-family:inherit;text-align:center;min-height:56px;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .mtile .em{font-size:30px;}
  .mtile.sel{border-color:var(--teal);background:#e9f7f9;}
  .mtile.done{background:#e7f7ef;border-color:var(--good);color:#10623e;opacity:.75;}
  .mtile.wrong{border-color:var(--warn);background:#fdeede;}
  .mtile:active{transform:scale(.97);}

  .swipe-card{background:#f4f7fb;border:3px solid #dfe6f0;border-radius:20px;padding:24px 18px;text-align:center;}
  .swipe-emoji{font-size:72px;line-height:1;margin-bottom:6px;}
  .swipe-sentence{font-size:24px;font-weight:700;color:var(--navy);margin:10px 0 4px;}
  .swipe-btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;}
  .swipe-btn{border:none;border-radius:18px;padding:20px;font-size:26px;font-weight:800;font-family:inherit;cursor:pointer;}
  .swipe-btn.no{background:#fdeede;color:#8a5410;}
  .swipe-btn.yes{background:#e7f7ef;color:#10623e;}
  .swipe-btn:active{transform:scale(.96);}

  .puz-build{
    min-height:64px;background:#eef2f8;border:3px dashed #c7d2e2;border-radius:14px;
    padding:10px;display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;align-items:center;
  }
  .puz-bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .puztile{
    background:var(--navy);color:#fff;border:none;border-radius:12px;
    padding:12px 14px;font-size:20px;font-weight:700;font-family:inherit;cursor:pointer;
  }
  .puztile:active{transform:scale(.95);}
  .puztile.inbuild{background:var(--teal);color:#06343a;}

  .feedback{margin-top:16px;border-radius:16px;padding:16px;font-size:19px;font-weight:700;display:none;}
  .feedback.show{display:block;}
  .feedback.good{background:#e7f7ef;color:#10623e;}
  .feedback.soft{background:#fff4e2;color:#8a5410;}
  .feedback .fb-rule{font-weight:400;margin-top:6px;color:#4a4030;}

  .nav{display:flex;gap:12px;margin-top:8px;}
  .btn{flex:1;border:none;border-radius:16px;padding:16px;font-size:19px;font-weight:800;font-family:inherit;cursor:pointer;}
  .btn.primary{background:var(--teal);color:#06343a;}
  .btn.ghost{background:#e7ecf4;color:var(--navy);}
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.4;}

  .backbtn{background:none;border:none;color:var(--navy);font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;padding:8px 4px;margin-bottom:6px;display:inline-flex;align-items:center;gap:6px;}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50;}
  .confetti-bit{position:absolute;width:10px;height:14px;border-radius:2px;will-change:transform,opacity;}

  .hidden{display:none;}
  .done-screen{text-align:center;padding:30px 10px;}
  .done-screen .big{font-size:56px;}
  .done-screen h2{color:var(--navy);font-size:26px;margin:10px 0;}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important;}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="unit-name">Come In 3</p>
    <h1 id="screenTitle">📅 The year</h1>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </header>

  <!-- ============ MENU (static HTML for file://) ============ -->
  <div id="menu">
    <p class="menu-title">Choose a game</p>

    <button class="menu-item" onclick="startTopic(0)">
      <span class="menu-emoji">📅</span>
      <span><span class="menu-label">Which month?</span>
      <span class="menu-sub">Listen and tap the month</span></span>
    </button>

    <button class="menu-item" onclick="startTopic(1)">
      <span class="menu-emoji">🔗</span>
      <span><span class="menu-label">Match it</span>
      <span class="menu-sub">Seasons and birthday words</span></span>
    </button>

    <button class="menu-item" onclick="startTopic(2)">
      <span class="menu-emoji">🌦️</span>
      <span><span class="menu-label">Which season?</span>
      <span class="menu-sub">Listen and choose</span></span>
    </button>

    <button class="menu-item" onclick="startTopic(3)">
      <span class="menu-emoji">👋</span>
      <span><span class="menu-label">Right or wrong?</span>
      <span class="menu-sub">Swipe yes or no</span></span>
    </button>

    <button class="menu-item" onclick="startTopic(4)">
      <span class="menu-emoji">🧩</span>
      <span><span class="menu-label">Build the sentence</span>
      <span class="menu-sub">Put the words in order</span></span>
    </button>
  </div>

  <!-- ============ QUIZ AREA ============ -->
  <div id="quiz" class="hidden">
    <button class="backbtn" onclick="goMenu()">‹ Menu</button>
    <div id="ruleSlot"></div>
    <div id="cardSlot"></div>
    <div class="feedback" id="feedback"></div>
    <div class="nav">
      <button class="btn ghost" id="checkBtn" onclick="checkAnswer()">Check</button>
      <button class="btn primary hidden" id="nextBtn" onclick="nextQuestion()">Next ›</button>
    </div>
  </div>

  <!-- ============ DONE ============ -->
  <div id="done" class="hidden done-screen">
    <div class="big">🏆</div>
    <h2 id="doneMsg">Super!</h2>
    <div class="nav">
      <button class="btn primary" onclick="goMenu()">Back to games</button>
    </div>
  </div>

</div>
<div id="confetti"></div>

<script>
"use strict";

/* =========================================================
   SPEECH  (Web Speech API, en-GB) — dyslexia-friendly slow rate
   ========================================================= */
var chosenVoice=null;
function pickVoice(){
  var vs=window.speechSynthesis.getVoices();
  chosenVoice = vs.find(function(v){return /en-GB/i.test(v.lang);})
            || vs.find(function(v){return /^en/i.test(v.lang);})
            || vs[0] || null;
}
if("speechSynthesis" in window){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window) || !text) return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  if(chosenVoice) u.voice=chosenVoice;
  u.lang="en-GB";
  u.rate=0.85;
  u.pitch=1.0;
  window.speechSynthesis.speak(u);
}

/* =========================================================
   CONTENT  (topics array — only this + UNIT_NAME change per unit)
   ========================================================= */
var UNIT_NAME="The year";

/* helper: build season options with emoji */
function S(name,em){ return {t:em+" "+name, s:name}; }

var topics=[
  /* 0 — Which month? (listen & choose) */
  {
    title:"Which month?",
    rule:`<div class="rule-head"><span class="rule-title">📅 Which month?</span>
          <button class="speak-mini" data-say="Listen and tap the right month.">🔊 Rule</button></div>
          <p>Tap <b>🔊 Listen</b>, then tap the month you hear.</p>
          <p>You can tap 🔊 on each month too.</p>`,
    questions:[
      {type:"choose", theme:"📅 Listen", teal:true, prompt:"Which month?", say:"March",
        options:["January","March","July"], correct:1,
        aff:"Tooor! Genau richtig! ⚽", wrong:"💛 Fast! Hör nochmal: es war March."},
      {type:"choose", theme:"📅 Listen", teal:true, prompt:"Which month?", say:"June",
        options:["April","December","June"], correct:2,
        aff:"Volltreffer! ⚽", wrong:"💛 Fast! Das war June."},
      {type:"choose", theme:"📅 Listen", teal:true, prompt:"Which month?", say:"September",
        options:["September","February","May"], correct:0,
        aff:"Pole Position! 🏁", wrong:"💛 Fast! Das war September."},
      {type:"choose", theme:"📅 Listen", teal:true, prompt:"Which month?", say:"December",
        options:["October","December","August"], correct:1,
        aff:"Stark! ⚽", wrong:"💛 Fast! Das war December."},
      {type:"choose", theme:"📅 Listen", teal:true, prompt:"Which month?", say:"April",
        options:["November","July","April"], correct:2,
        aff:"Schnell und sicher — wie ein Rennwagen! 🏎️💨", wrong:"💛 Fast! Das war April."}
    ]
  },

  /* 1 — Match seasons + birthday words */
  {
    title:"Match it",
    rule:`<div class="rule-head"><span class="rule-title">🔗 Match it</span>
          <button class="speak-mini" data-say="Tap a word, then tap its picture.">🔊 Rule</button></div>
          <p>Tap a <b>word</b>, then tap its <b>picture</b>.</p>
          <p>Tap 🔊 on a word to hear it.</p>`,
    questions:[
      {type:"match", theme:"🔗 Seasons", teal:true,
        pairs:[["spring","🌷"],["summer","☀️"],["autumn","🍂"],["winter","❄️"]],
        aff:"Alle Paare! Mannschaftsleistung! ⚽🏆", wrong:"💛 Fast! Tippe das Wort, dann das Bild."},
      {type:"match", theme:"🎂 Birthday", teal:true,
        pairs:[["cake","🎂"],["present","🎁"],["candle","🕯️"],["crown","👑"]],
        aff:"Perfekt verbunden! 🏁", wrong:"💛 Fast! Probier es in Ruhe."},
      {type:"match", theme:"🎂 Birthday", teal:true,
        pairs:[["card","💌"],["garland","🎉"],["song","🎵"]],
        aff:"Geschafft — Doppelpass sitzt! ⚽", wrong:"💛 Fast! Schau nochmal hin."}
    ]
  },

  /* 2 — Which season? (listen to a clue, choose season) */
  {
    title:"Which season?",
    rule:`<div class="rule-head"><span class="rule-title">🌦️ Which season?</span>
          <button class="speak-mini" data-say="Listen. Is it spring, summer, autumn or winter?">🔊 Rule</button></div>
          <p>Seasons: <b>🌷 spring, ☀️ summer, 🍂 autumn, ❄️ winter</b>.</p>
          <p>Listen to the sentence. Which season is it?</p>`,
    questions:[
      {type:"choose", theme:"🍂 Clue", show:"The leaves fall off the tree.", say:"The leaves fall off the tree.",
        prompt:"Which season?", options:[S("spring","🌷"),S("autumn","🍂"),S("summer","☀️")], correct:1,
        aff:"Tor! Du hast es gehört! ⚽", wrong:"💛 Fast! Wenn Blätter fallen, ist es autumn 🍂."},
      {type:"choose", theme:"☀️ Clue", show:"We jump into the pool and eat ice-cream.", say:"We jump into the pool and eat ice cream.",
        prompt:"Which season?", options:[S("summer","☀️"),S("winter","❄️"),S("spring","🌷")], correct:0,
        aff:"Volltreffer! ☀️⚽", wrong:"💛 Fast! Pool und Eis — das ist summer ☀️."},
      {type:"choose", theme:"❄️ Clue", show:"It is cold and snowy. We wear a woolly hat.", say:"It is cold and snowy. We wear a woolly hat.",
        prompt:"Which season?", options:[S("autumn","🍂"),S("winter","❄️"),S("spring","🌷")], correct:1,
        aff:"Stark erkannt! 🏁", wrong:"💛 Fast! Schnee und Mütze — das ist winter ❄️."},
      {type:"choose", theme:"🌷 Clue", show:"The flowers start to bloom.", say:"The flowers start to bloom.",
        prompt:"Which season?", options:[S("spring","🌷"),S("autumn","🍂"),S("summer","☀️")], correct:0,
        aff:"Sauber! 🌷⚽", wrong:"💛 Fast! Wenn Blumen blühen, ist es spring 🌷."},
      {type:"choose", theme:"❄️ Clue", show:"December is in this season.", say:"December is in this season.",
        prompt:"Which season?", options:[S("summer","☀️"),S("winter","❄️"),S("autumn","🍂")], correct:1,
        aff:"Pole Position! 🏎️", wrong:"💛 Fast! December gehört zu winter ❄️."}
    ]
  },

  /* 3 — Right or wrong? (swipe) */
  {
    title:"Right or wrong?",
    rule:`<div class="rule-head"><span class="rule-title">👋 Right or wrong?</span>
          <button class="speak-mini" data-say="Listen. Tap yes if it is right. Tap no if it is wrong.">🔊 Rule</button></div>
          <p>Listen to the sentence.</p>
          <p>Tap ✅ <b>yes</b> if it is right. Tap ❌ <b>no</b> if it is wrong.</p>`,
    questions:[
      {type:"swipe", theme:"☀️ Check", emoji:"☀️", text:"Summer is hot.", answer:true,
        aff:"Richtig! Sicher wie ein Elfmeter! ⚽", wrong:"💛 Fast! Summer ist heiß — das ist richtig."},
      {type:"swipe", theme:"❄️ Check", emoji:"❄️", text:"Winter is hot.", answer:false,
        aff:"Erkannt! Gutes Auge! 🏎️", wrong:"💛 Fast! Winter ist kalt, nicht heiß."},
      {type:"swipe", theme:"🍂 Check", emoji:"🍂", text:"Autumn comes after summer.", answer:true,
        aff:"Tor! Genau! ⚽", wrong:"💛 Fast! Nach summer kommt autumn — richtig."},
      {type:"swipe", theme:"📅 Check", emoji:"📅", text:"There are ten months in a year.", answer:false,
        aff:"Stark gebremst und richtig! 🏁", wrong:"💛 Fast! Ein Jahr hat zwölf (12) Monate."},
      {type:"swipe", theme:"🎂 Check", emoji:"🎂", text:"We eat cake on a birthday.", answer:true,
        aff:"Sauber! 🎂⚽", wrong:"💛 Fast! Am Geburtstag essen wir Kuchen — richtig."}
    ]
  },

  /* 4 — Build the sentence (puzzle) */
  {
    title:"Build the sentence",
    rule:`<div class="rule-head"><span class="rule-title">🧩 Build the sentence</span>
          <button class="speak-mini" data-say="Tap the words in the right order.">🔊 Rule</button></div>
          <p>Tap the words in the right order.</p>
          <p>Tip: a question ends with <b>?</b></p>`,
    questions:[
      {type:"puzzle", theme:"🧩 Order", teal:true, words:["When's","your","birthday?"],
        aff:"Frage gebaut wie ein Profi! ⚽", wrong:"💛 Fast! Beginne mit \"When's\". Tippe 🔊 zum Hören."},
      {type:"puzzle", theme:"🧩 Order", teal:true, words:["My","birthday","is","in","May."],
        aff:"Satz steht! 🏎️", wrong:"💛 Fast! Beginne mit \"My\"."},
      {type:"puzzle", theme:"🧩 Order", teal:true, words:["Happy","birthday","to","you!"],
        aff:"Perfekt! 🏆", wrong:"💛 Fast! Beginne mit \"Happy\"."}
    ]
  }
];

/* =========================================================
   SHARED ENGINE  (generic — identical for all non-clock units)
   ========================================================= */
var curTopic=0, curQ=0, answered=false;
function $(id){return document.getElementById(id);}

function startTopic(i){
  curTopic=i; curQ=0;
  $("menu").classList.add("hidden");
  $("done").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  $("screenTitle").textContent=topics[i].title;
  $("ruleSlot").innerHTML='<div class="rule">'+topics[i].rule+'</div>';
  wireSpeak($("ruleSlot"));
  loadQuestion();
}

function goMenu(){
  if("speechSynthesis" in window) window.speechSynthesis.cancel();
  $("quiz").classList.add("hidden");
  $("done").classList.add("hidden");
  $("menu").classList.remove("hidden");
  $("screenTitle").textContent="📅 The year";
  setProgress(0);
}

function setProgress(p){ $("progressFill").style.width=p+"%"; }

function loadQuestion(){
  answered=false;
  var t=topics[curTopic], q=t.questions[curQ];
  setProgress(Math.round(curQ/t.questions.length*100));
  $("feedback").className="feedback";
  $("feedback").innerHTML="";
  $("nextBtn").classList.add("hidden");
  $("checkBtn").classList.remove("hidden");
  $("checkBtn").disabled=false;

  var tag='<span class="theme-tag '+((q.teal||q.theme2)?"teal":"")+'">'+(q.theme||"")+'</span>';
  var html=tag;

  if(q.type==="choose"){ html+=renderChoose(q); $("checkBtn").classList.add("hidden"); }
  else if(q.type==="match"){ html+=renderMatch(q); $("checkBtn").classList.add("hidden"); }
  else if(q.type==="swipe"){ html+=renderSwipe(q); $("checkBtn").classList.add("hidden"); }
  else if(q.type==="puzzle"){ html+=renderPuzzle(q); }

  $("cardSlot").innerHTML='<div class="card">'+html+'</div>';
  wireSpeak($("cardSlot"));
  if(q.type==="choose") wireChoose(q);
  if(q.type==="match") wireMatch(q);
  if(q.type==="swipe") wireSwipe(q);
  if(q.type==="puzzle") wirePuzzle(q);
}

/* ---------- CHOOSE (listen & choose) ---------- */
function normOpt(o){ return (typeof o==="string") ? {t:o,s:o} : o; }
function renderChoose(q){
  var opts=q.options.map(normOpt);
  var html="";
  if(q.show){
    html+='<div class="sentence">'+q.show+'</div>';
  }
  html+='<button class="speak" data-say="'+esc(q.say)+'"><span class="ico">🔊</span> Listen</button>';
  html+='<p class="prompt">'+q.prompt+'</p>';
  html+='<div class="options">';
  for(var i=0;i<opts.length;i++){
    html+='<button class="opt" data-i="'+i+'">'+
            '<span class="opt-label">'+opts[i].t+'</span>'+
            '<span class="opt-speak" data-say="'+esc(opts[i].s)+'">🔊</span>'+
          '</button>';
  }
  html+='</div>';
  return html;
}
function wireChoose(q){
  document.querySelectorAll("#cardSlot .opt").forEach(function(opt){
    opt.addEventListener("click",function(){
      if(answered) return;
      answerChoose(parseInt(opt.getAttribute("data-i"),10),q);
    });
  });
}
function answerChoose(i,q){
  answered=true;
  var opts=q.options.map(normOpt);
  var btns=document.querySelectorAll("#cardSlot .opt");
  btns.forEach(function(b,idx){
    if(idx===q.correct) b.classList.add("correct");
    b.style.pointerEvents="none";
  });
  if(i===q.correct){ win(q.aff,""); }
  else{ btns[i].classList.add("wrong"); soft(q.wrong,""); }
  speak(opts[q.correct].s);
  showNext();
}

/* ---------- MATCH ---------- */
var matchSel=null, matchDone=0, matchTotal=0;
function renderMatch(q){
  matchSel=null; matchDone=0; matchTotal=q.pairs.length;
  var left=q.pairs.map(function(p){return p[0];});
  var right=shuffle(q.pairs.map(function(p){return p[1];}));
  var L='<div class="mcol">';
  left.forEach(function(w){
    L+='<button class="mtile" data-type="word" data-val="'+esc(w)+'">'+w+
       ' <span class="em" data-say="'+esc(w)+'">🔊</span></button>';
  });
  L+='</div>';
  var R='<div class="mcol">';
  right.forEach(function(em){
    R+='<button class="mtile" data-type="emoji" data-val="'+esc(em)+'"><span class="em">'+em+'</span></button>';
  });
  R+='</div>';
  return '<p class="prompt">Match the pairs</p><div class="match">'+L+R+'</div>';
}
function wireMatch(q){
  var pairsMap={};
  q.pairs.forEach(function(p){pairsMap[p[0]]=p[1];});
  document.querySelectorAll("#cardSlot .mtile").forEach(function(t){
    t.addEventListener("click",function(){
      if(t.classList.contains("done")) return;
      if(t.getAttribute("data-type")==="word") speak(t.getAttribute("data-val"));
      if(!matchSel){
        if(t.getAttribute("data-type")!=="word") return;
        matchSel=t; t.classList.add("sel"); return;
      }
      if(matchSel===t){ t.classList.remove("sel"); matchSel=null; return; }
      if(t.getAttribute("data-type")==="word"){
        matchSel.classList.remove("sel"); matchSel=t; t.classList.add("sel"); return;
      }
      var word=matchSel.getAttribute("data-val");
      var em=t.getAttribute("data-val");
      if(pairsMap[word]===em){
        matchSel.classList.remove("sel"); matchSel.classList.add("done"); t.classList.add("done");
        matchSel=null; matchDone++;
        if(matchDone===matchTotal){ answered=true; win(q.aff,""); showNext(); }
      }else{
        var bad=t; matchSel.classList.remove("sel"); bad.classList.add("wrong");
        soft(q.wrong,""); matchSel=null;
        setTimeout(function(){ bad.classList.remove("wrong"); $("feedback").className="feedback"; },900);
      }
    });
  });
}

/* ---------- SWIPE ---------- */
function renderSwipe(q){
  var em=q.emoji?'<div class="swipe-emoji">'+q.emoji+'</div>':"";
  return '<div class="swipe-card">'+em+
    '<div class="swipe-sentence">'+q.text+'</div>'+
    '<button class="speak" data-say="'+esc(q.text)+'"><span class="ico">🔊</span> Listen</button>'+
    '<div class="swipe-btns">'+
      '<button class="swipe-btn no" data-ans="no">❌ No</button>'+
      '<button class="swipe-btn yes" data-ans="yes">✅ Yes</button>'+
    '</div></div>';
}
function wireSwipe(q){
  document.querySelectorAll("#cardSlot .swipe-btn").forEach(function(b){
    b.addEventListener("click",function(){
      if(answered) return;
      answerSwipe(b.getAttribute("data-ans")==="yes",q);
    });
  });
}
function answerSwipe(picked,q){
  answered=true;
  document.querySelectorAll("#cardSlot .swipe-btn").forEach(function(b){b.style.pointerEvents="none";});
  if(picked===q.answer){ win(q.aff,""); } else{ soft(q.wrong,""); }
  speak(q.text);
  showNext();
}

/* ---------- PUZZLE ---------- */
var puzBuild=[];
function renderPuzzle(q){
  puzBuild=[];
  var bank=shuffle(q.words.slice());
  var b='<div class="puz-bank" id="puzBank">';
  bank.forEach(function(w){ b+='<button class="puztile" data-w="'+esc(w)+'">'+w+'</button>'; });
  b+='</div>';
  return '<p class="prompt">Put the words in order</p>'+
    '<button class="speak" data-say="'+esc(q.words.join(" "))+'"><span class="ico">🔊</span> Listen</button>'+
    '<div class="puz-build" id="puzBuild"><span style="color:#9aa7bd">tap words…</span></div>'+b;
}
function wirePuzzle(q){
  document.querySelectorAll("#puzBank .puztile").forEach(function(tile){
    tile.addEventListener("click",function(){
      if(tile.classList.contains("inbuild")) return;
      tile.classList.add("inbuild");
      puzBuild.push(tile.getAttribute("data-w"));
      renderBuild();
    });
  });
}
function renderBuild(){
  var area=$("puzBuild");
  if(puzBuild.length===0){ area.innerHTML='<span style="color:#9aa7bd">tap words…</span>'; return; }
  area.innerHTML="";
  puzBuild.forEach(function(w,i){
    var t=document.createElement("button");
    t.className="puztile inbuild"; t.textContent=w;
    t.onclick=function(){ puzBuild.splice(i,1); syncBank(); renderBuild(); };
    area.appendChild(t);
  });
}
function syncBank(){
  var used=puzBuild.slice();
  document.querySelectorAll("#puzBank .puztile").forEach(function(bt){
    var w=bt.getAttribute("data-w"); var idx=used.indexOf(w);
    if(idx>=0){ bt.classList.add("inbuild"); used.splice(idx,1); }
    else{ bt.classList.remove("inbuild"); }
  });
}
function checkAnswer(){
  var q=topics[curTopic].questions[curQ];
  if(q.type!=="puzzle" || answered) return;
  if(puzBuild.join(" ")===q.words.join(" ")){
    answered=true; win(q.aff,""); speak(q.words.join(" ")); showNext();
  }else{ soft(q.wrong,""); }
}

/* ---------- feedback + flow ---------- */
function win(msg,rule){
  var f=$("feedback"); f.className="feedback good show";
  f.innerHTML=msg+(rule?'<div class="fb-rule">'+rule+'</div>':""); burst();
}
function soft(msg,rule){
  var f=$("feedback"); f.className="feedback soft show";
  f.innerHTML=msg+(rule?'<div class="fb-rule">'+rule+'</div>':"");
}
function showNext(){ $("checkBtn").classList.add("hidden"); $("nextBtn").classList.remove("hidden"); }
function nextQuestion(){
  var t=topics[curTopic]; curQ++;
  if(curQ>=t.questions.length){
    setProgress(100);
    $("quiz").classList.add("hidden"); $("done").classList.remove("hidden");
    $("doneMsg").textContent="Super! You finished "+t.title+"! 🏆";
    speak("Well done!"); burst(); return;
  }
  loadQuestion();
}

/* ---------- helpers ---------- */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }
function shuffle(a){
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=a[i]; a[i]=a[j]; a[j]=tmp; }
  return a;
}
function wireSpeak(root){
  root.querySelectorAll("[data-say]").forEach(function(el){
    el.addEventListener("click",function(e){ e.stopPropagation(); speak(el.getAttribute("data-say")); });
  });
}

/* ---------- confetti ---------- */
function burst(){
  if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  var c=$("confetti");
  var colors=["#1fb6c4","#1a2a4a","#7fd9e2","#ffffff","#2bb673"];
  for(var i=0;i<26;i++){
    (function(){
      var bit=document.createElement("div");
      bit.className="confetti-bit";
      bit.style.background=colors[Math.floor(Math.random()*colors.length)];
      bit.style.left=(40+Math.random()*20)+"%"; bit.style.top="40%";
      c.appendChild(bit);
      var dx=(Math.random()-0.5)*400, dy=-(150+Math.random()*250), rot=(Math.random()-0.5)*720, dur=900+Math.random()*700;
      bit.animate([
        {transform:"translate(0,0) rotate(0deg)",opacity:1},
        {transform:"translate("+dx+"px,"+(dy+400)+"px) rotate("+rot+"deg)",opacity:0}
      ],{duration:dur,easing:"cubic-bezier(.2,.6,.4,1)"});
      setTimeout(function(){bit.remove();},dur);
    })();
  }
}

/* warm up voices on first tap (iOS needs a user gesture) */
document.body.addEventListener("touchstart",function once(){
  if("speechSynthesis" in window) pickVoice();
},{once:true});
</script>
